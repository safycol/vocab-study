<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語句学習</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #5b6ef5;
      --accent-light: #eef0fe;
      --accent-dark: #4454d4;
      --review-color: #f5a623;
      --review-light: #fff8ec;
      --done-color: #38a169;
      --text-main: #1a202c;
      --text-sub: #718096;
      --border: #e2e8f0;
      --bg: #f7f8fc;
      --card-bg: #ffffff;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #5b6ef5 0%, #7c3aed 100%);
      color: white;
      padding: 20px 20px 0;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-date { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .streak-box {
      text-align: center;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 14px;
      min-width: 60px;
    }
    .streak-num { font-size: 22px; font-weight: 800; line-height: 1; }
    .streak-label { font-size: 10px; opacity: 0.9; margin-top: 2px; }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .progress-bar {
      flex: 1;
      background: rgba(255,255,255,0.3);
      border-radius: 6px;
      height: 6px;
      overflow: hidden;
    }
    .progress-fill {
      background: white;
      height: 100%;
      border-radius: 6px;
      width: 70%;
    }
    .progress-text { font-size: 12px; opacity: 0.9; white-space: nowrap; }

    /* ── Tabs ────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 4px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .tab-btn.active {
      color: white;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: white;
      border-radius: 3px 3px 0 0;
    }
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--review-color);
      color: white;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ── Views ───────────────────────────────────── */
    .view { display: none; padding: 16px; }
    .view.active { display: block; }

    /* ── Cards ───────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border: 1.5px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.3s ease both;
    }
    .card.review-marked {
      border-color: var(--review-color);
      background: var(--review-light);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-8px); }
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .word-block { flex: 1; }
    .word { font-size: 26px; font-weight: 800; color: var(--text-main); }
    .reading { font-size: 13px; color: var(--text-sub); margin-top: 3px; }
    .category-tag {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      margin-top: 4px;
    }
    .review-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sub);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .review-btn:hover { border-color: var(--review-color); color: var(--review-color); }
    .review-btn.marked {
      background: var(--review-color);
      border-color: var(--review-color);
      color: white;
    }
    .meaning {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
      background: #f7f8fc;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .card.review-marked .meaning { background: rgba(255,255,255,0.7); }
    .example-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }
    .example {
      font-size: 13px;
      color: #4a5568;
      line-height: 1.7;
    }

    /* ── Next batch button ───────────────────────── */
    .next-btn-wrap { text-align: center; padding: 8px 0 24px; }
    .next-btn {
      background: white;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .next-btn:hover {
      background: var(--accent);
      color: white;
    }
    .next-btn:disabled {
      border-color: var(--border);
      color: var(--text-sub);
      cursor: default;
    }
    .next-btn:disabled:hover {
      background: white;
      color: var(--text-sub);
    }
    .pool-status {
      text-align: center;
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 10px;
      margin-bottom: 8px;
    }

    /* ── Review list ─────────────────────────────── */
    .review-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-sub);
    }
    .review-empty .icon { font-size: 48px; margin-bottom: 12px; }
    .review-empty p { font-size: 14px; line-height: 1.6; }
    .review-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
      border-left: 4px solid var(--review-color);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      animation: slideIn 0.3s ease both;
    }
    .review-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .review-word { font-size: 22px; font-weight: 800; }
    .review-reading { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .done-btn {
      background: white;
      border: 1.5px solid var(--done-color);
      color: var(--done-color);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .done-btn:hover { background: var(--done-color); color: white; }
    .review-meaning {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .review-example { font-size: 12px; color: #4a5568; line-height: 1.7; }
    .review-category {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-light);
      padding: 2px 7px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 8px;
    }
    .review-count {
      font-size: 12px;
      color: var(--text-sub);
      margin-bottom: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">語句学習</div>
      <div class="header-date">2026年5月21日</div>
    </div>
    <div class="streak-box">
      <div class="streak-num">6</div>
      <div class="streak-label">日連続</div>
    </div>
  </div>
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="progress-text">120/170語 紹介済み</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('today')">今日の語句</button>
    <button class="tab-btn" onclick="switchTab('review')" id="review-tab-btn">
      復習リスト<span class="tab-badge" id="review-badge" style="display:none">0</span>
    </button>
  </div>
</div>

<div id="today-view" class="view active">
  <div id="cards-container"></div>
  <div class="pool-status" id="pool-status"></div>
  <div class="next-btn-wrap">
    <button class="next-btn" id="next-btn" onclick="showNextBatch()">次の語句を見る →</button>
  </div>
</div>

<div id="review-view" class="view">
  <div id="review-container"></div>
</div>

<script>
// ── Embedded data ────────────────────────────────────────────────
const ALL_VOCAB = {"1": {"id": 1, "word": "忖度", "reading": "そんたく", "meaning": "相手の気持ちや意向を直接聞かずに推し量ること", "example": "上司の忖度ばかりしていては、本質的な問題解決が遠のく。", "category": "難読語句"}, "2": {"id": 2, "word": "齟齬", "reading": "そご", "meaning": "話や物事がうまく噛み合わず食い違うこと", "example": "認識に齟齬があったため、プロジェクトの方針を再確認した。", "category": "難読語句"}, "3": {"id": 3, "word": "瑕疵", "reading": "かし", "meaning": "欠点・傷・不完全な部分。法律上は契約不適合を指す", "example": "納品物に瑕疵が発見され、修正対応を求められた。", "category": "難読語句"}, "4": {"id": 4, "word": "逼迫", "reading": "ひっぱく", "meaning": "物事が差し迫っていて余裕がない状態", "example": "期末に向けて予算が逼迫し、追加発注を見送る判断をした。", "category": "難読語句"}, "5": {"id": 5, "word": "払拭", "reading": "ふっしょく", "meaning": "疑念・不安・悪いイメージなどを完全に取り除くこと", "example": "丁寧な説明でお客様の不安を払拭することができた。", "category": "難読語句"}, "6": {"id": 6, "word": "乖離", "reading": "かいり", "meaning": "二つのものの間に生じた大きなへだたり・ずれ", "example": "現場の実態と経営層の認識に乖離が生じていた。", "category": "難読語句"}, "7": {"id": 7, "word": "俯瞰", "reading": "ふかん", "meaning": "高い所から見下ろすこと。物事全体を広く見渡すこと", "example": "課題を俯瞰して捉えることで、本質的な原因が見えてきた。", "category": "難読語句"}, "8": {"id": 8, "word": "僭越", "reading": "せんえつ", "meaning": "自分の立場をわきまえず出すぎた言動をすること", "example": "僭越ながら、一点だけご提案させていただいてもよろしいでしょうか。", "category": "難読語句"}, "9": {"id": 9, "word": "逡巡", "reading": "しゅんじゅん", "meaning": "ためらってなかなか決断できないこと", "example": "逡巡していても時間だけが過ぎる。まずは一歩踏み出すことが大切だ。", "category": "難読語句"}, "10": {"id": 10, "word": "斟酌", "reading": "しんしゃく", "meaning": "相手の事情や気持ちを考慮して手加減・配慮すること", "example": "相手の立場を斟酌した上で、発言の仕方を工夫した。", "category": "難読語句"}, "11": {"id": 11, "word": "忌憚", "reading": "きたん", "meaning": "遠慮・憚り。「忌憚のない〜」の形で「率直な」という意味で使う", "example": "忌憚のないご意見をいただき、改善につなげることができました。", "category": "難読語句"}, "12": {"id": 12, "word": "真摯", "reading": "しんし", "meaning": "真剣で誠実なこと。ひたむきに物事に向き合う態度", "example": "お客様のご指摘を真摯に受け止め、再発防止に努めます。", "category": "難読語句"}, "13": {"id": 13, "word": "端緒", "reading": "たんしょ", "meaning": "物事の始まり・きっかけ・糸口", "example": "この小さな改善が、大きなイノベーションの端緒となった。", "category": "難読語句"}, "14": {"id": 14, "word": "造詣", "reading": "ぞうけい", "meaning": "ある分野への深い理解・知識・技能の高さ", "example": "彼はマーケティングに造詣が深く、常に的確なアドバイスをくれる。", "category": "難読語句"}, "15": {"id": 15, "word": "醸成", "reading": "じょうせい", "meaning": "ある雰囲気・状態・感情を徐々に作り出すこと", "example": "チーム内に信頼関係を醸成するため、定期的な対話の場を設けた。", "category": "難読語句"}, "16": {"id": 16, "word": "牽引", "reading": "けんいん", "meaning": "引っ張ること。先頭に立って組織や事業を導くこと", "example": "彼女のリーダーシップがプロジェクト成功を牽引した。", "category": "難読語句"}, "17": {"id": 17, "word": "折衝", "reading": "せっしょう", "meaning": "利害が対立する相手と交渉・駆け引きをすること", "example": "取引先との価格折衝は、双方が納得できる着地点を探る作業だ。", "category": "難読語句"}, "18": {"id": 18, "word": "矜持", "reading": "きょうじ", "meaning": "自分の能力・仕事に対する誇りと自信。プライド", "example": "プロとしての矜持を持って、どんな仕事にも全力で取り組む。", "category": "難読語句"}, "19": {"id": 19, "word": "蓋然性", "reading": "がいぜんせい", "meaning": "ある事柄が起こりうる可能性・確からしさの程度", "example": "このリスクが顕在化する蓋然性は低いが、対策は講じておくべきだ。", "category": "難読語句"}, "20": {"id": 20, "word": "漸進", "reading": "ぜんしん", "meaning": "少しずつ着実に前進すること。急がず段階的に進めること", "example": "組織改革は急激な変化より漸進的なアプローチが定着しやすい。", "category": "難読語句"}, "21": {"id": 21, "word": "嚆矢", "reading": "こうし", "meaning": "物事の始まり・先駆け。ある分野の最初となるもの", "example": "この製品こそが、国内スマート家電普及の嚆矢となった。", "category": "難読語句"}, "22": {"id": 22, "word": "恣意的", "reading": "しいてき", "meaning": "自分の思いのままに判断・行動する様子。根拠がなく気まま", "example": "恣意的な基準での評価は、社員の不満を招く原因になる。", "category": "難読語句"}, "23": {"id": 23, "word": "迂闊", "reading": "うかつ", "meaning": "注意が足りず、うっかりしていること", "example": "迂闊にも締め切りを見落としてしまい、大変ご迷惑をおかけした。", "category": "難読語句"}, "24": {"id": 24, "word": "畢竟", "reading": "ひっきょう", "meaning": "結局のところ・つまるところ。最終的に行き着く結論", "example": "畢竟、信頼とは日々の小さな積み重ねで築かれるものだ。", "category": "難読語句"}, "25": {"id": 25, "word": "俄然", "reading": "がぜん", "meaning": "急に・にわかに。突然ある状態になる様子", "example": "新しいプロジェクトに配属が決まり、俄然やる気が出てきた。", "category": "難読語句"}, "26": {"id": 26, "word": "所謂", "reading": "いわゆる", "meaning": "世間一般で言うところの。よく言われる", "example": "彼はいわゆる叩き上げで、現場から這い上がってきた人物だ。", "category": "難読語句"}, "27": {"id": 27, "word": "概ね", "reading": "おおむね", "meaning": "だいたい・ほぼ。大部分において", "example": "計画は概ね順調に進んでいるが、一部に課題が残っている。", "category": "難読語句"}, "28": {"id": 28, "word": "専ら", "reading": "もっぱら", "meaning": "ひたすらそれだけに集中して。そればかり", "example": "入社後は専ら営業に従事し、顧客開拓に力を注いだ。", "category": "難読語句"}, "29": {"id": 29, "word": "適宜", "reading": "てきぎ", "meaning": "状況に応じて適切に判断・対応すること", "example": "詳細は現場担当者が適宜判断して対応してください。", "category": "難読語句"}, "30": {"id": 30, "word": "逐次", "reading": "ちくじ", "meaning": "順番に・次々と。一つずつ順を追って", "example": "進捗状況を逐次報告するよう、チームに周知した。", "category": "難読語句"}, "31": {"id": 31, "word": "敷衍", "reading": "ふえん", "meaning": "意味や内容を詳しく説明して広げること", "example": "要点だけでなく、背景を敷衍して説明することで理解が深まった。", "category": "難読語句"}, "32": {"id": 32, "word": "慮る", "reading": "おもんぱかる", "meaning": "十分に考慮する・思いやる。相手の立場に立って考えること", "example": "相手の立場を慮った一言が、交渉をスムーズにすることがある。", "category": "難読語句"}, "33": {"id": 33, "word": "捻出", "reading": "ねんしゅつ", "meaning": "工夫してなんとか作り出すこと（時間・費用など）", "example": "多忙な中でも学習時間を捻出するために、通勤時間を活用した。", "category": "難読語句"}, "34": {"id": 34, "word": "憂慮", "reading": "ゆうりょ", "meaning": "先のことを心配して思い悩むこと", "example": "市場の急変を憂慮し、早めにリスクヘッジの対策を講じた。", "category": "難読語句"}, "35": {"id": 35, "word": "邁進", "reading": "まいしん", "meaning": "目標に向かって力強く突き進むこと", "example": "困難な局面でも、目標達成に向けて邁進する姿勢を大切にしたい。", "category": "難読語句"}, "36": {"id": 36, "word": "按分", "reading": "あんぶん", "meaning": "全体を一定の比率・割合に応じて配分すること", "example": "共有コストは売上高に応じて按分し、各部署に計上する。", "category": "難読語句"}, "37": {"id": 37, "word": "是正", "reading": "ぜせい", "meaning": "悪い点・誤りを改めて正すこと", "example": "法令違反が判明したため、速やかに是正措置を講じた。", "category": "ビジネス漢語"}, "38": {"id": 38, "word": "懸念", "reading": "けねん", "meaning": "気になって不安に思うこと。心配・憂慮", "example": "スケジュール遅延に懸念を示す声が社内で上がっている。", "category": "ビジネス漢語"}, "39": {"id": 39, "word": "進捗", "reading": "しんちょく", "meaning": "物事がどれだけ進んでいるか。はかどり具合", "example": "毎週月曜日に各チームの進捗を報告する会議を設けている。", "category": "ビジネス漢語"}, "40": {"id": 40, "word": "示唆", "reading": "しさ", "meaning": "それとなく知らせること。暗にほのめかすこと", "example": "今回の調査結果は、新たな市場機会の存在を示唆している。", "category": "ビジネス漢語"}, "41": {"id": 41, "word": "精査", "reading": "せいさ", "meaning": "細かいところまで詳しく調べること", "example": "契約書の内容を精査した上で、署名するかどうかを判断する。", "category": "ビジネス漢語"}, "42": {"id": 42, "word": "策定", "reading": "さくてい", "meaning": "計画・方針・基準などを立案して定めること", "example": "来期の中期経営計画を策定するため、役員合宿を実施した。", "category": "ビジネス漢語"}, "43": {"id": 43, "word": "体裁", "reading": "ていさい", "meaning": "外から見た様子・見栄え。世間に対する見せ方", "example": "体裁だけを整えても、中身が伴わなければ信頼は得られない。", "category": "ビジネス漢語"}, "44": {"id": 44, "word": "所作", "reading": "しょさ", "meaning": "立ち居振る舞い・身のこなし・動作", "example": "接客の場では、言葉遣いだけでなく所作にも気を配ることが大切だ。", "category": "ビジネス漢語"}, "45": {"id": 45, "word": "伯仲", "reading": "はくちゅう", "meaning": "力量が互いに優劣つけがたく、ほぼ同等であること", "example": "両社の技術力は伯仲しており、差別化が課題となっている。", "category": "ビジネス漢語"}, "46": {"id": 46, "word": "鑑みる", "reading": "かんがみる", "meaning": "前例・手本・状況などに照らし合わせて考える", "example": "昨年の実績に鑑みて、今期の目標数値を設定した。", "category": "ビジネス漢語"}, "47": {"id": 47, "word": "粛々と", "reading": "しゅくしゅくと", "meaning": "静かに、騒がず、着実に物事を進める様子", "example": "批判を受けながらも、チームは粛々と作業を続けた。", "category": "ビジネス漢語"}, "48": {"id": 48, "word": "斬新", "reading": "ざんしん", "meaning": "発想や方法が非常に新しく、独創的であること", "example": "斬新なデザインが審査員の目を引き、最優秀賞を受賞した。", "category": "ビジネス漢語"}, "49": {"id": 49, "word": "顕在化", "reading": "けんざいか", "meaning": "潜在していた問題・需要などが表面に現れること", "example": "長年の経費管理の甘さが、今回の調査で一気に顕在化した。", "category": "ビジネス漢語"}, "50": {"id": 50, "word": "網羅的", "reading": "もうらてき", "meaning": "関係するものを漏れなく全て含んでいること", "example": "網羅的にリスクを洗い出すことで、抜け漏れのない対策が立てられる。", "category": "ビジネス漢語"}, "51": {"id": 51, "word": "抜本的", "reading": "ばっぽんてき", "meaning": "問題の根本から徹底的に取り組むこと", "example": "表面的な対処では限界があり、抜本的な改革が必要だ。", "category": "ビジネス漢語"}, "52": {"id": 52, "word": "喫緊", "reading": "きっきん", "meaning": "非常に差し迫っていること。今すぐ対処が必要な状態", "example": "人材不足は、当社にとって喫緊の課題となっている。", "category": "ビジネス漢語"}, "53": {"id": 53, "word": "看過", "reading": "かんか", "meaning": "見て見ぬふりをすること。問題を見逃すこと", "example": "今回の不正は組織として看過できない問題であると判断した。", "category": "ビジネス漢語"}, "54": {"id": 54, "word": "勘案", "reading": "かんあん", "meaning": "複数の要素を考え合わせること。総合的に考慮すること", "example": "コストと品質を勘案した結果、現行サプライヤーを継続することにした。", "category": "ビジネス漢語"}, "55": {"id": 55, "word": "所存", "reading": "しょぞん", "meaning": "心に思っていること・考え。「〜所存です」の形で決意を表す", "example": "全力で取り組む所存ですので、何卒よろしくお願いいたします。", "category": "ビジネス漢語"}, "56": {"id": 56, "word": "如実", "reading": "にょじつ", "meaning": "実際の通りに・ありありと。事実をそのまま示している様子", "example": "今回の数字は、現場の努力が如実に反映された結果だ。", "category": "ビジネス漢語"}, "57": {"id": 57, "word": "一助", "reading": "いちじょ", "meaning": "少しでも助けになること。わずかな力添え", "example": "この資料が皆様のご判断の一助となれば幸いです。", "category": "ビジネス漢語"}, "58": {"id": 58, "word": "寄与", "reading": "きよ", "meaning": "役に立つこと・貢献すること", "example": "新製品の投入が、業績回復に大きく寄与した。", "category": "ビジネス漢語"}, "59": {"id": 59, "word": "尽力", "reading": "じんりょく", "meaning": "力を尽くして努力すること", "example": "ご尽力いただいたおかげで、無事に契約を締結できました。", "category": "ビジネス漢語"}, "60": {"id": 60, "word": "奔走", "reading": "ほんそう", "meaning": "物事のために駆け回って努力すること", "example": "新規顧客獲得のために奔走した甲斐があり、目標を達成できた。", "category": "ビジネス漢語"}, "61": {"id": 61, "word": "傾注", "reading": "けいちゅう", "meaning": "心や力を集中して注ぎ込むこと", "example": "この一年、製品開発に全力を傾注してきた。", "category": "ビジネス漢語"}, "62": {"id": 62, "word": "掌握", "reading": "しょうあく", "meaning": "しっかりと把握・支配すること。完全に理解・管理すること", "example": "プロジェクト全体の状況を掌握した上で、次の判断を下した。", "category": "ビジネス漢語"}, "63": {"id": 63, "word": "統括", "reading": "とうかつ", "meaning": "全体をまとめて管理・指揮すること", "example": "彼女は3つの部署を統括するポジションに就いている。", "category": "ビジネス漢語"}, "64": {"id": 64, "word": "周知", "reading": "しゅうち", "meaning": "広く世間や関係者に知らせること。「周知の事実」「周知徹底」", "example": "新ルールを社内に周知徹底するため、全体会議を開催した。", "category": "ビジネス漢語"}, "65": {"id": 65, "word": "遂行", "reading": "すいこう", "meaning": "目的・任務・計画をやり遂げること", "example": "困難な状況の中でも、任務を最後まで遂行することが求められる。", "category": "ビジネス漢語"}, "66": {"id": 66, "word": "総括", "reading": "そうかつ", "meaning": "全体をまとめて締めくくること。まとめ・総まとめ", "example": "プロジェクト終了後、成果と課題を総括する報告書を作成した。", "category": "ビジネス漢語"}, "67": {"id": 67, "word": "督促", "reading": "とくそく", "meaning": "早くするよう催促すること。期日を守るよう促すこと", "example": "期日を過ぎても返答がないため、督促のメールを送った。", "category": "ビジネス漢語"}, "68": {"id": 68, "word": "猶予", "reading": "ゆうよ", "meaning": "時間的余裕を与えること。実行を先延ばしにすること", "example": "支払い期日の猶予をお願いしたところ、1週間の延長を認めていただいた。", "category": "ビジネス漢語"}, "69": {"id": 69, "word": "糧", "reading": "かて", "meaning": "生きるための食料・栄養。転じて力・成長の源となるもの", "example": "今回の失敗を糧にして、次は必ず成功させてみせる。", "category": "ビジネス漢語"}, "70": {"id": 70, "word": "醸造", "reading": "じょうぞう", "meaning": "発酵によって酒・酢などを作ること。転じて雰囲気を徐々に作ること", "example": "時間をかけて醸造された信頼関係こそが、長期取引の基盤となる。", "category": "ビジネス漢語"}, "71": {"id": 71, "word": "率先垂範", "reading": "そっせんすいはん", "meaning": "自ら先頭に立って行動し、周囲に手本を示すこと", "example": "管理職が率先垂範することで、チーム全体の士気が上がった。", "category": "四字熟語"}, "72": {"id": 72, "word": "切磋琢磨", "reading": "せっさたくま", "meaning": "互いに競い合いながら共に努力して向上すること", "example": "同期と切磋琢磨することで、互いの成長を引き出せた。", "category": "四字熟語"}, "73": {"id": 73, "word": "臨機応変", "reading": "りんきおうへん", "meaning": "その場の状況に応じて、柔軟に適切な判断・行動をすること", "example": "トラブル発生時は臨機応変に対応できるかどうかが問われる。", "category": "四字熟語"}, "74": {"id": 74, "word": "試行錯誤", "reading": "しこうさくご", "meaning": "いろいろと試みながら失敗を繰り返しつつ解決策を探すこと", "example": "試行錯誤を重ねた結果、ついに最適な製造方法を見つけた。", "category": "四字熟語"}, "75": {"id": 75, "word": "虚心坦懐", "reading": "きょしんたんかい", "meaning": "先入観や私情を持たず、素直な気持ちで物事に向き合うこと", "example": "虚心坦懐にフィードバックを受け取ることが成長への近道だ。", "category": "四字熟語"}, "76": {"id": 76, "word": "一期一会", "reading": "いちごいちえ", "meaning": "一生に一度限りの出会いとして、その縁を大切にすること", "example": "お客様との出会いを一期一会と心がけることで、信頼が生まれる。", "category": "四字熟語"}, "77": {"id": 77, "word": "不言実行", "reading": "ふげんじっこう", "meaning": "あれこれ言わず、黙って実行すること", "example": "口だけでなく不言実行で示す姿勢が、周囲の信頼を得る。", "category": "四字熟語"}, "78": {"id": 78, "word": "温故知新", "reading": "おんこちしん", "meaning": "古いことを研究・学んで、そこから新しい知識や見解を得ること", "example": "温故知新の精神で過去の事例を見直すと、意外なヒントが見つかる。", "category": "四字熟語"}, "79": {"id": 79, "word": "初志貫徹", "reading": "しょしかんてつ", "meaning": "最初に決めた志・目標を最後まで貫き通すこと", "example": "どんな困難があっても初志貫徹の精神で取り組み続けることが大切だ。", "category": "四字熟語"}, "80": {"id": 80, "word": "以心伝心", "reading": "いしんでんしん", "meaning": "言葉を使わなくても、気持ちや考えが相手に伝わること", "example": "長く一緒に仕事をしてきた仲間とは、以心伝心でわかり合える。", "category": "四字熟語"}, "81": {"id": 81, "word": "公明正大", "reading": "こうめいせいだい", "meaning": "正々堂々として公正であること。かくし立てなく公平なこと", "example": "評価は公明正大に行わなければ、組織の信頼が失われる。", "category": "四字熟語"}, "82": {"id": 82, "word": "大義名分", "reading": "たいぎめいぶん", "meaning": "行動の正当な理由・建前。社会的に認められる根拠", "example": "大義名分なき変革は、社内の理解が得られず失敗しやすい。", "category": "四字熟語"}, "83": {"id": 83, "word": "千載一遇", "reading": "せんざいいちぐう", "meaning": "千年に一度というほどまれな、絶好の機会", "example": "この業界再編は千載一遇のチャンスと捉え、積極的に動く。", "category": "四字熟語"}, "84": {"id": 84, "word": "一意専心", "reading": "いちいせんしん", "meaning": "一つのことに心を集中して、ひたむきに打ち込むこと", "example": "余計なことを考えず一意専心で取り組んだことが、成功の要因だ。", "category": "四字熟語"}, "85": {"id": 85, "word": "質実剛健", "reading": "しつじつごうけん", "meaning": "飾り気がなく誠実で、心身ともに強くたくましいこと", "example": "質実剛健な社風が、長年にわたって顧客の信頼を支えてきた。", "category": "四字熟語"}, "86": {"id": 86, "word": "捲土重来", "reading": "けんどちょうらい", "meaning": "一度敗れた者が勢いを盛り返し、再び攻め返してくること", "example": "昨年の失敗を糧に捲土重来を期し、今期は万全の準備で臨む。", "category": "四字熟語"}, "87": {"id": 87, "word": "明鏡止水", "reading": "めいきょうしすい", "meaning": "余計な感情や邪念がなく、心が静かで澄み切った状態", "example": "明鏡止水の境地で交渉に臨むことで、冷静な判断ができる。", "category": "四字熟語"}, "88": {"id": 88, "word": "堅忍不抜", "reading": "けんにんふばつ", "meaning": "どんな困難にも心を動かされず、じっと耐え忍ぶこと", "example": "堅忍不抜の精神で難局を乗り越えた彼の姿勢は、チームの鑑だ。", "category": "四字熟語"}, "89": {"id": 89, "word": "融通無碍", "reading": "ゆうずうむげ", "meaning": "何事にもとらわれず、自由自在に対応できること", "example": "ルールに縛られすぎず、融通無碍に状況を判断することも大切だ。", "category": "四字熟語"}, "90": {"id": 90, "word": "換骨奪胎", "reading": "かんこつだったい", "meaning": "既存のものをもとにして、内容を新しく作り変えること", "example": "競合製品を換骨奪胎し、自社ブランドとして新たに投入した。", "category": "四字熟語"}, "91": {"id": 91, "word": "ご査収", "reading": "ごさしゅう", "meaning": "書類・データ等をよく確認して受け取っていただくこと", "example": "添付の資料をご査収の上、ご確認いただけますと幸いです。", "category": "敬語・丁寧表現"}, "92": {"id": 92, "word": "ご高配", "reading": "ごこうはい", "meaning": "相手からの深い心遣いや配慮への敬意を示す言葉", "example": "平素より格別のご高配を賜り、厚く御礼申し上げます。", "category": "敬語・丁寧表現"}, "93": {"id": 93, "word": "ご清栄", "reading": "ごせいえい", "meaning": "相手の健康と繁栄を願う挨拶表現", "example": "貴社ますますご清栄のこととお慶び申し上げます。", "category": "敬語・丁寧表現"}, "94": {"id": 94, "word": "恐縮", "reading": "きょうしゅく", "meaning": "相手の親切や手間をかけさせることへの恐れ多い気持ち", "example": "お忙しい中ご対応いただき、誠に恐縮でございます。", "category": "敬語・丁寧表現"}, "95": {"id": 95, "word": "承る", "reading": "うけたまわる", "meaning": "謹んで受ける・聞く・引き受ける（謙譲語）", "example": "ご注文を承りました。翌営業日にご連絡いたします。", "category": "敬語・丁寧表現"}, "96": {"id": 96, "word": "賜る", "reading": "たまわる", "meaning": "目上の人からいただく（謙譲語）。「いただく」のより改まった表現", "example": "貴重なお時間を賜り、誠にありがとうございました。", "category": "敬語・丁寧表現"}, "97": {"id": 97, "word": "拝察", "reading": "はいさつ", "meaning": "相手の気持ちや状況を推し量ること（謙譲語）", "example": "ご多忙のことと拝察いたしますが、何卒よろしくお願いいたします。", "category": "敬語・丁寧表現"}, "98": {"id": 98, "word": "ご厚情", "reading": "ごこうじょう", "meaning": "相手の温かい気持ちや親切への感謝を表す言葉", "example": "長年にわたるご厚情に心より感謝申し上げます。", "category": "敬語・丁寧表現"}, "99": {"id": 99, "word": "ご尽力", "reading": "ごじんりょく", "meaning": "相手が努力・力を尽くしてくれることへの敬意を表す言葉", "example": "本件にご尽力いただき、誠にありがとうございました。", "category": "敬語・丁寧表現"}, "100": {"id": 100, "word": "ご了承", "reading": "ごりょうしょう", "meaning": "相手に事情を理解・承知していただくこと", "example": "急なご連絡となり恐縮ですが、何卒ご了承くださいますようお願い申し上げます。", "category": "敬語・丁寧表現"}, "101": {"id": 101, "word": "ご容赦", "reading": "ごようしゃ", "meaning": "相手に許していただくこと。大目に見てもらうこと", "example": "不手際がございました点、何卒ご容赦いただけますと幸いです。", "category": "敬語・丁寧表現"}, "102": {"id": 102, "word": "ご笑納", "reading": "ごしょうのう", "meaning": "贈り物を「笑って受け取ってください」という謙遜の表現", "example": "ささやかではございますが、ご笑納いただければ幸いです。", "category": "敬語・丁寧表現"}, "103": {"id": 103, "word": "ご一読", "reading": "ごいちどく", "meaning": "一度お読みいただくこと", "example": "ご多忙のところ恐縮ですが、ぜひご一読いただければと存じます。", "category": "敬語・丁寧表現"}, "104": {"id": 104, "word": "叱咤激励", "reading": "しったげきれい", "meaning": "厳しく励まして奮い立たせること", "example": "上司から叱咤激励を受けて、諦めかけていた目標に再挑戦した。", "category": "敬語・丁寧表現"}, "105": {"id": 105, "word": "エスカレーション", "reading": "escalation", "meaning": "解決できない問題や重要な判断を上位者へ報告・相談すること", "example": "自分の権限では判断できないため、上長にエスカレーションした。", "category": "ビジネス用語"}, "106": {"id": 106, "word": "コンセンサス", "reading": "consensus", "meaning": "関係者全員の合意・同意。意見の一致", "example": "方針を決定する前に、関係部署のコンセンサスを得ることが重要だ。", "category": "ビジネス用語"}, "107": {"id": 107, "word": "アジェンダ", "reading": "agenda", "meaning": "会議の議題・予定表。話し合うべき項目の一覧", "example": "会議前にアジェンダを共有しておくと議論がスムーズに進む。", "category": "ビジネス用語"}, "108": {"id": 108, "word": "フィジビリティ", "reading": "feasibility", "meaning": "実行可能性・実現性。「フィジビリティスタディ（FS）」の形でも使う", "example": "新規事業のフィジビリティを検討するため、市場調査を実施した。", "category": "ビジネス用語"}, "109": {"id": 109, "word": "ステークホルダー", "reading": "stakeholder", "meaning": "利害関係者。プロジェクトや企業活動に影響を受ける全ての関係者", "example": "プロジェクト開始前に、全ステークホルダーの期待値を把握する。", "category": "ビジネス用語"}, "110": {"id": 110, "word": "マイルストーン", "reading": "milestone", "meaning": "プロジェクト等における重要な中間目標・節目", "example": "第一マイルストーンとして、来月末までにプロトタイプを完成させる。", "category": "ビジネス用語"}, "111": {"id": 111, "word": "ナレッジ", "reading": "knowledge", "meaning": "知識・知見。組織内で共有すべき有益な情報や経験", "example": "成功事例をナレッジとして蓄積し、全社で活用できる仕組みを作る。", "category": "ビジネス用語"}, "112": {"id": 112, "word": "バッファ", "reading": "buffer", "meaning": "余裕・緩衝。スケジュールや予算に設ける余白", "example": "想定外のトラブルに備え、スケジュールにバッファを持たせておく。", "category": "ビジネス用語"}, "113": {"id": 113, "word": "ペンディング", "reading": "pending", "meaning": "未解決・保留中。結論が出ていない状態", "example": "予算承認がペンディングのため、発注はいったん待機することにした。", "category": "ビジネス用語"}, "114": {"id": 114, "word": "イニシアティブ", "reading": "initiative", "meaning": "主導権・率先して行動すること。先手を取ること", "example": "競合に先んじてイニシアティブを取ることが市場制覇のカギとなる。", "category": "ビジネス用語"}, "115": {"id": 115, "word": "クロージング", "reading": "closing", "meaning": "交渉・商談を締めくくり、最終合意に持ち込むこと", "example": "ヒアリングと提案を丁寧に重ねた結果、スムーズにクロージングできた。", "category": "ビジネス用語"}, "116": {"id": 116, "word": "ボトルネック", "reading": "bottleneck", "meaning": "全体の流れを妨げている制約・障害となっている部分", "example": "承認フローのボトルネックを解消したことで、処理速度が倍になった。", "category": "ビジネス用語"}, "117": {"id": 117, "word": "リスクヘッジ", "reading": "risk hedge", "meaning": "損失や不測の事態に備えて、あらかじめリスクを軽減する対策を取ること", "example": "複数のサプライヤーと契約するのも、調達リスクヘッジの一手だ。", "category": "ビジネス用語"}, "118": {"id": 118, "word": "ロールモデル", "reading": "role model", "meaning": "手本・模範となる人物。目標とすべき存在", "example": "後輩にとってのロールモデルになれるよう、日々の行動を意識している。", "category": "ビジネス用語"}, "119": {"id": 119, "word": "シナジー", "reading": "synergy", "meaning": "相乗効果。複数の要素が組み合わさって単独以上の成果を生むこと", "example": "両社の合併によってシナジーが生まれ、コスト削減と売上拡大を実現した。", "category": "ビジネス用語"}, "120": {"id": 120, "word": "アカウンタビリティ", "reading": "accountability", "meaning": "説明責任。行動や判断の結果について、関係者に説明する義務", "example": "管理職にはアカウンタビリティが求められ、結果に対して説明責任を持つ。", "category": "ビジネス用語"}, "121": {"id": 121, "word": "一石を投じる", "reading": "いっせきをとうじる", "meaning": "問題提起をして議論・変化のきっかけを作ること", "example": "彼の発言が一石を投じ、長年の慣習を見直す議論が始まった。", "category": "慣用句"}, "122": {"id": 122, "word": "舵を切る", "reading": "かじをきる", "meaning": "方針や方向性を大きく転換すること", "example": "業績悪化を受け、会社は事業構造の見直しへと大きく舵を切った。", "category": "慣用句"}, "123": {"id": 123, "word": "腰を据える", "reading": "こしをすえる", "meaning": "落ち着いてじっくり取り組むこと", "example": "短期的な成果を求めず、腰を据えて取り組む姿勢が重要だ。", "category": "慣用句"}, "124": {"id": 124, "word": "実を結ぶ", "reading": "みをむすぶ", "meaning": "努力や活動が成果・結果につながること", "example": "数年越しの研究開発がついに実を結び、画期的な製品が完成した。", "category": "慣用句"}, "125": {"id": 125, "word": "歯車が噛み合う", "reading": "はぐるまがかみあう", "meaning": "物事や人が互いにうまく連携して機能すること", "example": "チームの歯車が噛み合い始めてから、生産性が目に見えて上がった。", "category": "慣用句"}, "126": {"id": 126, "word": "板挟みになる", "reading": "いたばさみになる", "meaning": "二つの相反する立場の間で身動きが取れなくなること", "example": "上司と顧客の要求が相反し、担当者は板挟みになってしまった。", "category": "慣用句"}, "127": {"id": 127, "word": "根回しをする", "reading": "ねまわしをする", "meaning": "正式な場の前に、関係者に事前に話を通して理解を得ておくこと", "example": "提案が通るかどうかは、会議前の根回しにかかっていることが多い。", "category": "慣用句"}, "128": {"id": 128, "word": "折り合いをつける", "reading": "おりあいをつける", "meaning": "双方が少しずつ譲り合って妥協点・合意点を見つけること", "example": "価格交渉では、お互いが折り合いをつける姿勢が不可欠だ。", "category": "慣用句"}, "129": {"id": 129, "word": "一線を画する", "reading": "いっせんをかくする", "meaning": "明確に区別すること。他とはっきり異なる部分を示すこと", "example": "当社の品質管理は競合他社と一線を画すると自負している。", "category": "慣用句"}, "130": {"id": 130, "word": "功を奏する", "reading": "こうをそうする", "meaning": "ある手段や努力が効果を発揮して、うまくいくこと", "example": "早期の顧客フォローが功を奏し、解約を未然に防ぐことができた。", "category": "慣用句"}, "131": {"id": 131, "word": "先手を打つ", "reading": "せんてをうつ", "meaning": "相手より先に行動して有利な立場を確保すること", "example": "競合の動向を見越して先手を打ったことが、シェア拡大につながった。", "category": "慣用句"}, "132": {"id": 132, "word": "大局を見る", "reading": "たいきょくをみる", "meaning": "細部ではなく、全体の流れや状況を把握すること", "example": "細かい数字に囚われず、大局を見て判断することが経営者の役目だ。", "category": "慣用句"}, "133": {"id": 133, "word": "膿を出す", "reading": "うみをだす", "meaning": "隠れていた問題や不正を明らかにして解決すること", "example": "組織を立て直すには、まず膿を出す勇気が必要だ。", "category": "慣用句"}, "134": {"id": 134, "word": "目を見張る", "reading": "めをみはる", "meaning": "驚いて目を大きく開く。著しく目立って驚かせること", "example": "彼の成長ぶりは目を見張るものがあり、入社2年で主任に抜擢された。", "category": "慣用句"}, "135": {"id": 135, "word": "水面下で動く", "reading": "すいめんかでうごく", "meaning": "表に出さずに、こっそりと準備・交渉を進めること", "example": "発表の前から、水面下でパートナーシップの交渉が進んでいた。", "category": "慣用句"}, "136": {"id": 136, "word": "筋道を立てる", "reading": "すじみちをたてる", "meaning": "論理的に順序立てて考えたり、話をまとめたりすること", "example": "感情的にならず、筋道を立てて問題の原因と解決策を整理した。", "category": "慣用句"}, "137": {"id": 137, "word": "立て板に水", "reading": "たていたにみず", "meaning": "滞りなく流れるようによどみなく話すこと", "example": "彼のプレゼンは立て板に水で、聴衆を引き込むのがうまい。", "category": "慣用句"}, "138": {"id": 138, "word": "道筋をつける", "reading": "みちすじをつける", "meaning": "物事が進む方向性・解決策の見通しを示すこと", "example": "まず上司が課題の解決に向けた道筋をつけてくれた。", "category": "慣用句"}, "139": {"id": 139, "word": "机上の空論", "reading": "きじょうのくうろん", "meaning": "理論としては成り立っても、実際には役に立たない考えや計画", "example": "現場を知らない人の提案は、しばしば机上の空論に終わる。", "category": "慣用句"}, "140": {"id": 140, "word": "二の足を踏む", "reading": "にのあしをふむ", "meaning": "ためらって、なかなか踏み切れないこと", "example": "リスクの大きさに二の足を踏んでいたが、最終的に決断した。", "category": "慣用句"}, "141": {"id": 141, "word": "七転び八起き", "reading": "ななころびやおき", "meaning": "何度失敗しても諦めずに立ち上がること", "example": "七転び八起きの精神で挑戦し続けた結果、ついに事業が軌道に乗った。", "category": "ことわざ"}, "142": {"id": 142, "word": "石の上にも三年", "reading": "いしのうえにもさんねん", "meaning": "辛くても辛抱して続ければ、やがて成果が出るということ", "example": "石の上にも三年という気持ちで、地道に技術を磨き続けた。", "category": "ことわざ"}, "143": {"id": 143, "word": "急がば回れ", "reading": "いそがばまわれ", "meaning": "急ぐときほど、安全で確実な方法を選ぶほうが結果的に早い", "example": "急がば回れで、まず基礎を固めてからシステムを構築した。", "category": "ことわざ"}, "144": {"id": 144, "word": "備えあれば憂いなし", "reading": "そなえあればうれいなし", "meaning": "普段からしっかり準備しておけば、いざというとき困らない", "example": "BCP（事業継続計画）の整備こそ、備えあれば憂いなしの実践だ。", "category": "ことわざ"}, "145": {"id": 145, "word": "柔よく剛を制す", "reading": "じゅうよくごうをせいす", "meaning": "柔軟なものが、かえって強固なものを制することができる", "example": "交渉では剛から剛でぶつかるより、柔よく剛を制す戦略が有効なことも多い。", "category": "ことわざ"}, "146": {"id": 146, "word": "情けは人のためならず", "reading": "なさけはひとのためならず", "meaning": "人に親切にすることは、巡り巡って自分のためになる", "example": "情けは人のためならず——困っている後輩を助けた縁が、数年後に仕事につながった。", "category": "ことわざ"}, "147": {"id": 147, "word": "三人寄れば文殊の知恵", "reading": "さんにんよればもんじゅのちえ", "meaning": "凡人でも三人集まって知恵を出し合えば、すばらしい考えが生まれる", "example": "三人寄れば文殊の知恵で、チームで話し合うことで良いアイデアが出た。", "category": "ことわざ"}, "148": {"id": 148, "word": "聞くは一時の恥、聞かぬは一生の恥", "reading": "きくはいっときのはじ、きかぬはいっしょうのはじ", "meaning": "知らないことを聞くのは一時の恥だが、聞かずにいると生涯知らないままで恥ずかしい", "example": "わからないことはその場で聞くべきだ。聞くは一時の恥、聞かぬは一生の恥だ。", "category": "ことわざ"}, "149": {"id": 149, "word": "能ある鷹は爪を隠す", "reading": "のうあるたかはつめをかくす", "meaning": "本当に実力のある人は、むやみに自分の才能を見せびらかさない", "example": "能ある鷹は爪を隠すというように、彼は普段は控えめだが、いざとなると頼りになる。", "category": "ことわざ"}, "150": {"id": 150, "word": "好事魔多し", "reading": "こうじまおおし", "meaning": "良いことが起きようとする時ほど、邪魔が入りやすい。油断禁物", "example": "好事魔多し——契約直前に担当者が異動となり、交渉がやり直しになった。", "category": "ことわざ"}, "151": {"id": 151, "word": "虎穴に入らずんば虎子を得ず", "reading": "こけつにいらずんばこじをえず", "meaning": "危険を冒さなければ、大きな成果は得られない", "example": "虎穴に入らずんば虎子を得ず——リスクを取る覚悟なくして、大きな成功はない。", "category": "ことわざ"}, "152": {"id": 152, "word": "覆水盆に返らず", "reading": "ふくすいぼんにかえらず", "meaning": "一度してしまったことは、取り返しがつかない", "example": "覆水盆に返らず。謝罪よりも、同じ失敗を繰り返さない行動が大切だ。", "category": "ことわざ"}, "153": {"id": 153, "word": "塵も積もれば山となる", "reading": "ちりもつもればやまとなる", "meaning": "小さなことでも積み重なれば大きなものになる", "example": "塵も積もれば山となる。毎日の小さな改善が、大きな生産性向上につながった。", "category": "ことわざ"}, "154": {"id": 154, "word": "窮すれば通ず", "reading": "きゅうすればつうず", "meaning": "行き詰まって困り果てると、かえって新たな道が開けてくる", "example": "窮すれば通ず——資金が底をついた危機が、新たなビジネスモデル発見のきっかけになった。", "category": "ことわざ"}, "155": {"id": 155, "word": "禍を転じて福となす", "reading": "わざわいをてんじてふくとなす", "meaning": "不運・失敗を逆手にとって、有利な状況に変えること", "example": "製品の欠陥を素早く公開・回収したことで、禍を転じて福となし、信頼度が上がった。", "category": "ことわざ"}, "156": {"id": 156, "word": "言語道断", "reading": "ごんごどうだん", "meaning": "もってのほか。言葉では言い表せないほどひどいこと", "example": "顧客情報の流出など言語道断であり、厳正に対処しなければならない。", "category": "その他教養語句"}, "157": {"id": 157, "word": "本末転倒", "reading": "ほんまつてんとう", "meaning": "重要なことと些細なことが逆になっていること", "example": "書類の体裁ばかり整えて内容が薄いのは本末転倒だ。", "category": "その他教養語句"}, "158": {"id": 158, "word": "付和雷同", "reading": "ふわらいどう", "meaning": "自分の意見を持たず、他人の意見にすぐ同調すること", "example": "会議では付和雷同せず、自分なりの意見を持って発言することが大切だ。", "category": "その他教養語句"}, "159": {"id": 159, "word": "自縄自縛", "reading": "じじょうじばく", "meaning": "自分の言動によって自分自身が身動きできなくなること", "example": "安請け合いを続けた結果、自縄自縛に陥って業務が回らなくなった。", "category": "その他教養語句"}, "160": {"id": 160, "word": "玉石混交", "reading": "ぎょくせきこんこう", "meaning": "優れたものとそうでないものが入り混じっていること", "example": "情報が玉石混交のネット時代こそ、情報リテラシーが問われる。", "category": "その他教養語句"}, "161": {"id": 161, "word": "一長一短", "reading": "いっちょういったん", "meaning": "良い点もあれば悪い点もあること。どちらにも一方的な優位はない", "example": "どの方法にも一長一短があり、状況に応じて使い分けることが重要だ。", "category": "その他教養語句"}, "162": {"id": 162, "word": "前車の轍を踏む", "reading": "ぜんしゃのてつをふむ", "meaning": "前の人と同じ失敗を繰り返すこと", "example": "過去の失敗事例をよく研究し、前車の轍を踏まないようにしたい。", "category": "その他教養語句"}, "163": {"id": 163, "word": "蛇足", "reading": "だそく", "meaning": "余計なもの・不必要な付け足し。あっても意味のない余分なもの", "example": "蛇足かもしれませんが、参考までにもう一点付け加えさせてください。", "category": "その他教養語句"}, "164": {"id": 164, "word": "杞憂", "reading": "きゆう", "meaning": "心配する必要のない取り越し苦労", "example": "新システムの導入に不安もあったが、結果的に杞憂に終わった。", "category": "その他教養語句"}, "165": {"id": 165, "word": "隗より始めよ", "reading": "かいよりはじめよ", "meaning": "大きなことを始めるには、まず手近なことから実行せよ", "example": "改革を訴えるなら隗より始めよ——まず自分の部署から変えていこう。", "category": "その他教養語句"}, "166": {"id": 166, "word": "百聞は一見にしかず", "reading": "ひゃっぶんはいっけんにしかず", "meaning": "何度も話を聞くより、一度自分の目で見る方が確かだ", "example": "百聞は一見にしかず。現場に足を運んで実態を自分の目で確かめた。", "category": "その他教養語句"}, "167": {"id": 167, "word": "光陰矢の如し", "reading": "こういんやのごとし", "meaning": "月日の過ぎるのは矢が飛ぶように速い。時間は貴重だという戒め", "example": "光陰矢の如し——気づけば入社から10年が経っていた。", "category": "その他教養語句"}, "168": {"id": 168, "word": "青天の霹靂", "reading": "せいてんのへきれき", "meaning": "晴天に突然雷が落ちるように、突然起きた衝撃的な出来事", "example": "突然の部署異動は青天の霹靂だったが、今となっては良い経験だった。", "category": "その他教養語句"}, "169": {"id": 169, "word": "灯台下暗し", "reading": "とうだいもとくらし", "meaning": "身近なことほど、かえって気づきにくいということ", "example": "社内に優秀な人材がいたことに長年気づかなかったのは灯台下暗しだ。", "category": "その他教養語句"}, "170": {"id": 170, "word": "羊頭狗肉", "reading": "ようとうくにく", "meaning": "見せかけと中身が違うこと。外見は立派だが実質が伴わないこと", "example": "誇大広告で消費者を欺く羊頭狗肉のビジネスは、必ず信頼を失う。", "category": "その他教養語句"}};
const TODAY_POOL = [114, 49, 22, 53, 51, 145, 42, 19, 160, 25, 126, 166, 14, 169, 63, 83, 106, 64, 96, 85];
const TODAY_DATE = '2026-05-21';
const BATCH_SIZE = 4;

// ── LocalStorage keys ────────────────────────────────────────────
const KEY_REVIEW   = 'kojivocab_review_v1';
const KEY_SHOWN    = 'kojivocab_shown_v1';
const KEY_DATE     = 'kojivocab_date_v1';

// ── State ────────────────────────────────────────────────────────
function getReviewSet() {
  return new Set(JSON.parse(localStorage.getItem(KEY_REVIEW) || '[]'));
}
function saveReviewSet(set) {
  localStorage.setItem(KEY_REVIEW, JSON.stringify([...set]));
}
function getShownCount() {
  if (localStorage.getItem(KEY_DATE) !== TODAY_DATE) {
    localStorage.setItem(KEY_DATE, TODAY_DATE);
    localStorage.setItem(KEY_SHOWN, '0');
    return 0;
  }
  return parseInt(localStorage.getItem(KEY_SHOWN) || '0');
}
function setShownCount(n) {
  localStorage.setItem(KEY_SHOWN, String(n));
}

// ── Tab switching ────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  if (tab === 'today') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('today-view').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('review-view').classList.add('active');
    renderReviewList();
  }
}

// ── Review badge ─────────────────────────────────────────────────
function updateBadge() {
  const count = getReviewSet().size;
  const badge = document.getElementById('review-badge');
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }
}

// ── Card rendering ────────────────────────────────────────────────
function createCard(id) {
  const w = ALL_VOCAB[String(id)];
  if (!w) return null;
  const reviewSet = getReviewSet();
  const isMarked = reviewSet.has(id);

  const card = document.createElement('div');
  card.className = 'card' + (isMarked ? ' review-marked' : '');
  card.id = 'card-' + id;

  card.innerHTML = `
    <div class="card-header">
      <div class="word-block">
        <div class="word">${w.word}</div>
        <div class="reading">${w.reading}</div>
        <div class="category-tag">${w.category}</div>
      </div>
      <button class="review-btn ${isMarked ? 'marked' : ''}"
              id="rbtn-${id}"
              onclick="toggleReview(${id})">
        ${isMarked ? '📌 復習中' : '＋ 要復習'}
      </button>
    </div>
    <div class="meaning">${w.meaning}</div>
    <div class="example-label">使用例</div>
    <div class="example">${w.example}</div>
  `;
  return card;
}

function toggleReview(id) {
  const reviewSet = getReviewSet();
  const btn = document.getElementById('rbtn-' + id);
  const card = document.getElementById('card-' + id);
  if (reviewSet.has(id)) {
    reviewSet.delete(id);
    btn.className = 'review-btn';
    btn.textContent = '＋ 要復習';
    card.classList.remove('review-marked');
  } else {
    reviewSet.add(id);
    btn.className = 'review-btn marked';
    btn.textContent = '📌 復習中';
    card.classList.add('review-marked');
  }
  saveReviewSet(reviewSet);
  updateBadge();
}

// ── Batch display ─────────────────────────────────────────────────
let shownCount = 0;

function showNextBatch() {
  const batch = TODAY_POOL.slice(shownCount, shownCount + BATCH_SIZE);
  if (batch.length === 0) return;

  const container = document.getElementById('cards-container');
  batch.forEach((id, i) => {
    const card = createCard(id);
    if (card) {
      card.style.animationDelay = (i * 0.07) + 's';
      container.appendChild(card);
    }
  });

  shownCount += batch.length;
  setShownCount(shownCount);
  updatePoolStatus();
}

function updatePoolStatus() {
  const remaining = TODAY_POOL.length - shownCount;
  const statusEl = document.getElementById('pool-status');
  const nextBtn = document.getElementById('next-btn');

  if (shownCount > 0) {
    statusEl.textContent = `本日の語句: ${shownCount} / ${TODAY_POOL.length} 語 表示済み`;
  }

  if (remaining <= 0) {
    nextBtn.disabled = true;
    nextBtn.textContent = '本日分はすべて表示しました';
    statusEl.textContent = `本日の語句: ${TODAY_POOL.length} / ${TODAY_POOL.length} 語 — 明日も続けましょう！`;
  } else {
    nextBtn.textContent = `次の語句を見る (${Math.min(BATCH_SIZE, remaining)}語) →`;
  }
}

// ── Review list ───────────────────────────────────────────────────
function renderReviewList() {
  const container = document.getElementById('review-container');
  container.innerHTML = '';
  const reviewSet = getReviewSet();

  if (reviewSet.size === 0) {
    container.innerHTML = `
      <div class="review-empty">
        <div class="icon">📖</div>
        <p>復習リストはまだ空です。<br>語句カードの「＋ 要復習」ボタンで<br>気になった語句を追加しましょう。</p>
      </div>`;
    return;
  }

  const countEl = document.createElement('div');
  countEl.className = 'review-count';
  countEl.textContent = `復習リスト: ${reviewSet.size} 語`;
  container.appendChild(countEl);

  reviewSet.forEach(id => {
    const w = ALL_VOCAB[String(id)];
    if (!w) return;

    const card = document.createElement('div');
    card.className = 'review-card';
    card.id = 'rcard-' + id;
    card.innerHTML = `
      <div class="review-card-header">
        <div>
          <div class="review-word">${w.word}</div>
          <div class="review-reading">${w.reading}</div>
        </div>
        <button class="done-btn" onclick="markDone(${id})">覚えた ✓</button>
      </div>
      <div class="review-meaning">${w.meaning}</div>
      <div class="review-example">${w.example}</div>
      <div class="review-category">${w.category}</div>
    `;
    container.appendChild(card);
  });
}

function markDone(id) {
  const card = document.getElementById('rcard-' + id);
  card.style.animation = 'fadeOut 0.3s ease forwards';
  setTimeout(() => {
    const reviewSet = getReviewSet();
    reviewSet.delete(id);
    saveReviewSet(reviewSet);
    updateBadge();

    // Also update the main card button if visible
    const mainBtn = document.getElementById('rbtn-' + id);
    const mainCard = document.getElementById('card-' + id);
    if (mainBtn) {
      mainBtn.className = 'review-btn';
      mainBtn.textContent = '＋ 要復習';
    }
    if (mainCard) {
      mainCard.classList.remove('review-marked');
    }

    renderReviewList();
  }, 280);
}

// ── Init ──────────────────────────────────────────────────────────
shownCount = getShownCount();

// Restore previously shown cards on reload
if (shownCount > 0) {
  const alreadyShown = TODAY_POOL.slice(0, shownCount);
  const container = document.getElementById('cards-container');
  alreadyShown.forEach(id => {
    const card = createCard(id);
    if (card) container.appendChild(card);
  });
  updatePoolStatus();
} else {
  // First load of the day — show first batch
  showNextBatch();
}

updateBadge();
</script>
