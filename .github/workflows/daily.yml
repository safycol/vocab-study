name: 毎日の語句ページ生成

on:
  schedule:
    # 毎朝7時（日本時間）= 22:00 UTC
    - cron: '0 22 * * *'
  workflow_dispatch:  # GitHubの画面から手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # index.html と progress.json をコミットするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 今日の語句ページを生成
        run: python study.py --no-browser
        env:
          CI: "true"
          TZ: Asia/Tokyo  # 日本時間で日付を扱う

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name  "vocab-bot"
          git config user.email "vocab-bot@users.noreply.github.com"
          git add index.html progress.json
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "vocab: $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push
